# ─────────────────────────────────────────────
#  TRADEBOT CONFIGURATION
#  Secrets (API keys) live in .env — not here.
#  Copy .env.example to .env and fill it in.
# ─────────────────────────────────────────────

# ── Alpaca ────────────────────────────────────
# Keys loaded from .env: ALPACA_API_KEY / ALPACA_API_SECRET
alpaca:
  paper_trading: true          # true = paper, false = live

# ── Budget ────────────────────────────────────
budget:
  max_total_usd: 10000         # Hard cap — bot never exceeds this
  reserve_pct: 0.05            # Keep 5% cash as buffer (covers fees)
  # CEILING not a target — bot will hold fewer positions if signals are weak.
  # It will never open a position just to fill a slot.
  max_open_positions: 8

# ── Position sizing (confidence-scaled) ───────
sizing:
  # Tiers: confidence score → % of available budget for that trade.
  # The bot sizes UP on conviction and DOWN on uncertainty.
  # Nothing forces it to use all tiers — if only 0.90+ signals appear,
  # it only opens high-conviction positions.
  tiers:
    - min_score: 0.80
      max_score: 1.00
      budget_pct: 0.20         # Very high conviction → 20% of budget
    - min_score: 0.65
      max_score: 0.80
      budget_pct: 0.10         # High conviction      → 10%
    - min_score: 0.50
      max_score: 0.65
      budget_pct: 0.05         # Medium conviction    → 5%
    - min_score: 0.40
      max_score: 0.50
      budget_pct: 0.02         # Low conviction       → 2% (or skip — see threshold)
  # Hard cap per position regardless of confidence.
  # Prevents any single trade from exceeding this % of budget.
  max_position_pct: 0.25       # No single position > 25% of budget
  min_trade_usd: 20            # Lower to 5 if running with ~$100 budget

# ── Risk management ───────────────────────────
risk:
  stop_loss_pct: 0.025         # Exit if position drops 2.5%
  take_profit_pct: 0.04        # Exit if position gains 4%
  max_daily_loss_pct: 0.05     # Halt trading if daily loss exceeds 5%
  trade_only_market_hours: true
  avoid_first_minutes: 15      # Skip first 15 min of session (volatile open)
  avoid_last_minutes: 10       # Skip last 10 min (illiquid close)

  # ── Negative news exit ──────────────────────────────────────────────────
  # If bad news hits a stock you're holding, exit immediately rather than
  # waiting for the stop-loss to trigger. Uses the same FinBERT scoring.
  negative_news_exit:
    enabled: true
    # Minimum absolute sentiment score to trigger an exit.
    # Score is in [-1, 0]: -1 = maximally bearish, 0 = neutral.
    # -0.60 = strong negative signal required (recommended starting point)
    # -0.45 = more sensitive, exits on moderate bad news
    # -0.75 = only exits on very strong negative news
    min_score: -0.60
    # Minimum number of negative articles needed to act.
    # Prevents a single sensationalist headline from triggering an exit.
    min_articles: 1

# ── Fees (factored into every trade decision) ─
fees:
  commission_per_trade_usd: 0.00    # Alpaca is commission-free
  sec_fee_per_dollar: 0.0000278     # SEC Section 31 fee (sell side only)
  finra_taf_per_share: 0.000166     # FINRA TAF (sell side, max $8.30)
  finra_taf_max_usd: 8.30
  currency_conversion_fee_pct: 0.00   # Alpaca trades in USD — no conversion fee

# ── News & Sentiment ──────────────────────────
# Optional: FINNHUB_KEY loaded from .env (real-time, free tier, 60 req/min)
news:
  lookback_minutes: 120  # matches MAX_ARTICLE_AGE_MINUTES in sentiment.py
  min_articles_for_signal: 1
  sentiment_threshold: 0.40

# ── Universe ──────────────────────────────────
# Tickers are grouped by sector/theme.
# All share the same selection criteria:
#   - High daily news volume (many articles = better FinBERT averaging)
#   - Large market cap (liquid, tight spreads, fast price reaction to news)
#   - Strong news-price correlation (market moves visibly on headlines)
#   - Affordable price (most are under $250, so a $10 position = at least 1 share
#     if using fractional, or viable at $20+ min_trade_usd for whole shares)
#
# NOTE ON PRICE vs BUDGET:
#   The bot buys whole shares only. If (budget_pct × available_cash) / price < 1,
#   the trade is skipped. With a small budget (e.g. $100), high-priced stocks like
#   NVDA ($130+) or AVGO ($200+) may be unreachable on low-conviction tiers.
#   The bot handles this gracefully — it skips and logs, never errors.
#   Alpaca supports fractional shares; set fractional: true below to enable.
#
fractional_shares: true        # Fractional shares enabled — no price floor.

universe:
  watchlist:
    # ── Mega-cap tech (highest news volume, fastest price reaction) ──────
    - AAPL    # Apple          ~$210  — product launches, regulatory, earnings
    - MSFT    # Microsoft      ~$415  — Azure, AI (Copilot/OpenAI), enterprise
    - GOOGL   # Alphabet       ~$170  — ads, AI (Gemini), antitrust, cloud
    - AMZN    # Amazon         ~$185  — AWS, retail, logistics, Alexa/AI
    - META    # Meta           ~$560  — ad revenue, Llama/AI, regulation
    - NVDA    # Nvidia         ~$130  — AI chips, data center, export controls

    # ── High-beta tech (volatile, news-reactive, lower price) ────────────
    - AMD     # AMD            ~$120  — CPU/GPU competition with Intel/Nvidia
    - TSLA    # Tesla          ~$250  — Musk news, EV sales, FSD/autonomy
    - PLTR    # Palantir       ~$80   — government contracts, AI platform
    - CRWD    # CrowdStrike    ~$370  — cybersecurity incidents, contracts

    # ── Semiconductors (heavily covered, supply-chain sensitive) ─────────
    - AVGO    # Broadcom       ~$215  — AI chip deals, VMware integration
    - TSM     # TSMC           ~$175  — foundry capacity, geopolitics (Taiwan)
    - QCOM    # Qualcomm       ~$155  — mobile chips, auto, licensing disputes

    # ── Cloud & enterprise software (earnings-driven, stable coverage) ───
    - CRM     # Salesforce     ~$290  — AI CRM, enterprise deals, earnings
    - SNOW    # Snowflake      ~$155  — data cloud, AI partnerships
    - NET     # Cloudflare     ~$115  — security, AI inference edge

    # ── Financials (reacts to Fed news, rates, macro — decorrelates tech) ─
    - JPM     # JPMorgan       ~$240  — Fed decisions, credit, M&A
    - GS      # Goldman Sachs  ~$555  — IPOs, trading revenue, macro
    - BAC     # Bank of America ~$45  — consumer credit, rates (affordable!)

    # ── ETFs (broad market sentiment, useful for macro signal reading) ────
    - SPY     # S&P 500 ETF    ~$580  — overall market direction
    - QQQ     # Nasdaq 100 ETF ~$490  — tech-heavy market sentiment
    - XLF     # Financials ETF ~$50   — sector-wide financial news signal

  allow_opportunistic: true
  opportunistic_min_score: 0.80   # Only act on very strong off-watchlist signals

# ── Order flow confirmation ───────────────────
# Microstructure gate: news sentiment says buy → order flow must confirm.
# Analyses the live tape (recent trades + order book) before executing.
# Also vetoes negative news exits if order flow is actually bullish.
#
# HOW IT WORKS:
#   delta      — aggressive buys vs sells in last N minutes (who's hitting?)
#   imbalance  — bid size vs ask size right now (who's waiting?)
#   absorption — is price NOT moving despite order pressure? (who's absorbing?)
#
# COMPOSITE SCORE: weighted sum of above, range [-1, +1]
#   +1 = strong buying pressure
#   -1 = strong selling pressure
#    0 = neutral / balanced
#
order_flow_confirmation:
  enabled: true

  # ── Entry gate ─────────────────────────────────────────────────────────
  # Minimum composite score to allow a buy. Range [0, 1].
  # 0.15 = modest buy pressure required (recommended)
  # 0.25 = stronger confirmation needed (fewer but higher quality entries)
  # 0.05 = very permissive (almost always passes)
  min_buy_score: 0.15

  # ── Negative news exit veto ────────────────────────────────────────────
  # If bad news hits a held stock but order flow is bullish (score >= this),
  # the news exit is vetoed — institutions may be buying the dip.
  # 0.20 = fairly confident buyers in control before vetoing a sell
  min_sell_veto_score: 0.20

  # ── Component weights (must sum to 1.0) ───────────────────────────────
  weights:
    delta:      0.50   # Most important — actual aggressive order flow
    imbalance:  0.30   # Book pressure — leading indicator
    absorption: 0.20   # Price vs pressure divergence

  # ── Data settings ──────────────────────────────────────────────────────
  # How many minutes of trade history to use for delta calculation.
  # Shorter = more reactive. Longer = more stable but slower to update.
  # Set false if on Alpaca free plan (no SIP data) — auto-detected but
  # setting false avoids the warning and skips the failed request entirely.
  use_trades: true

  trade_window_minutes: 5

  # Minimum trades needed to produce a valid signal.
  # Low-volume stocks/times may not have enough data.
  # Set lower (5) during pre/post market if needed.
  min_trades: 10

  # Absorption uses multiple snapshots to detect price vs pressure divergence.
  # snapshots × interval_sec = total time spent on absorption check (e.g. 3×2=6s)
  # Increase snapshots for more accuracy, decrease for faster execution.
  absorption_snapshots: 3
  absorption_interval_sec: 2

# ── Telegram reporting ────────────────────────
# Token and chat_id loaded from .env: TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
telegram:
  report_interval_hours: 1     # During market hours only; also sends at session close
  report_on_trade: true

# ── Logging ───────────────────────────────────
logging:
  log_dir: "./logs"
  log_level: "INFO"            # DEBUG / INFO / WARNING / ERROR
  trade_log_csv: "./logs/trades.csv"
