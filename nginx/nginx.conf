events {
    worker_connections 1024;
}

http {
    # Don't leak nginx version in error pages
    server_tokens off;

    # Rate limiting — prevents brute-force on the login prompt
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

        # ── Basic auth — your eyes only ───────────────────────────────────
        auth_basic           "TRADEBOT";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ── Proxy to Flask dashboard ──────────────────────────────────────
        location / {
            limit_req zone=dashboard burst=20 nodelay;

            proxy_pass         http://dashboard:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeout — dashboard is lightweight, keep short
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
        }

        # ── Health check endpoint (no auth) ──────────────────────────────
        location /healthz {
            auth_basic off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
